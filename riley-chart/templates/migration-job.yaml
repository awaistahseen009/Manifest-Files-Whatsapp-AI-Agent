apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migration
  namespace: riley
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: riley-secrets